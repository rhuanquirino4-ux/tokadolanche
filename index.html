<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toka DO Lanche - Sistema Garçom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header-vinho">
        <i class="fa-solid fa-chevron-left" onclick="voltar()"></i>
        <h1>Toka Do Lanche - Mesas </h1>
        <i class="fa-solid fa-rotate" onclick="location.reload()"></i>
    </header>

    <main>
        <section id="step-1" class="step active">
            <div class="grid-mesas" id="grid-mesas"></div>
        </section>

        <section id="step-2" class="step">
            <div class="container-input">
                <label>NOME DO CLIENTE:</label>
                <input type="text" id="input-nome" placeholder="Digite o nome aqui...">
            </div>
        </section>

        <section id="step-3" class="step">
            <div class="lista-vertical">
                <div class="card-produto" onclick="selecionarProd(this, 'X-Tudo Danilo', 35.00, 'artesanal')">
                    <img src="hamburguer-classico.png">
                    <div class="detalhe">
                        <h3>X-Tudo Danilo</h3>
                        <p>2 Carnes, ovo, bacon, salada.</p>
                        <span>R$ 35,00</span>
                    </div>
                </div>
                <div class="card-produto" onclick="selecionarProd(this, 'Smash Simples', 19.90, 'artesanal')">
                    <img src="hamburguer-classico.png">
                    <div class="detalhe">
                        <h3>Smash Simples</h3>
                        <p>Pão, carne e queijo.</p>
                        <span>R$ 19,90</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="step-4" class="step">
            <div class="lista-adicionais">
                <div class="item-adic" onclick="selecionarAdic(this, 'Bacon', 5.00)">Bacon Extra (+ R$ 5,00)</div>
                <div class="item-adic" onclick="selecionarAdic(this, 'Cebola', 3.00)">Cebola Caramelizada (+ R$ 3,00)</div>
                <div class="item-adic" onclick="selecionarAdic(this, 'Ovo', 2.50)">Ovo (+ R$ 2,50)</div>
            </div>
        </section>

        <section id="step-5" class="step">
            <div class="grid-bebidas">
                <div class="card-bebida" onclick="selecionarProd(this, 'Coca-Cola', 8.00, 'industrial')">
                    <img src="coca.jpg">
                    <p>Coca-Cola</p>
                </div>
                <div class="card-bebida" onclick="selecionarProd(this, 'Suco', 10.00, 'industrial')">
                    <img src="suco.jpeg">
                    <p>Suco Natural</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="controles">
        <button id="btn-proximo" onclick="proximo()">PRÓXIMO</button>
        <button id="btn-enviar" onclick="finalizar()" style="display: none;">ENVIAR PEDIDO</button>
    </footer>

    <div id="registro-flutuante" onclick="abrirRegistro()">Registro</div>

    <div id="modal-reg" class="modal"></div>

    <div id="toast" class="toast">✅ Pedido de <span id="t-nome"></span> realizado!</div>

    <script src="script.js"></script>
</body>
</html>
