<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danilo Lanches - Sistema Garçom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="header-vinho">
        <i class="fa-solid fa-chevron-left" onclick="voltar()"></i>
        <h1>Danilo Lanches - Mesas </h1>
        <i class="fa-solid fa-rotate" onclick="location.reload()"></i>
    </header>

    <main>
        <section id="step-1" class="step active">
            <div class="grid-mesas" id="grid-mesas"></div>
        </section>

        <section id="step-2" class="step">
            <div class="container-input">
                <label>NOME DO CLIENTE:</label>
                <input type="text" id="input-nome" placeholder="Digite o nome aqui...">
            </div>
        </section>

        <section id="step-3" class="step">
            <div class="lista-vertical">
                <div class="card-produto" onclick="selecionarProd(this, 'X-Tudo Danilo', 35.00)">
                    <img src="hamburguer-classico.png">
                    <div class="detalhe">
                        <h3>X-Tudo Danilo</h3>
                        <p>2 Carnes, ovo, bacon, salada.</p>
                        <span>R$ 35,00</span>
                    </div>
                </div>
                <div class="card-produto" onclick="selecionarProd(this, 'Smash Simples', 19.90)">
                    <img src="hamburguer-classico.png">
                    <div class="detalhe">
                        <h3>Smash Simples</h3>
                        <p>Pão, carne e queijo.</p>
                        <span>R$ 19,90</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="step-4" class="step">
            <div class="logo-svg">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#000" viewBox="0 0 16 16">
                    <path
                        d="M13 .5c0-.276-.226-.506-.498-.465-1.703.257-2.94 2.012-3 8.462a.5.5 0 0 0 .498.5c.56.01 1 .13 1 1.003v5.5a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5zM4.25 0a.25.25 0 0 1 .25.25v5.122a.128.128 0 0 0 .256.006l.233-5.14A.25.25 0 0 1 5.24 0h.522a.25.25 0 0 1 .25.238l.233 5.14a.128.128 0 0 0 .256-.006V.25A.25.25 0 0 1 6.75 0h.29a.5.5 0 0 1 .498.458l.423 5.07a1.69 1.69 0 0 1-1.059 1.711l-.053.022a.92.92 0 0 0-.58.884L6.47 15a.971.971 0 1 1-1.942 0l.202-6.855a.92.92 0 0 0-.58-.884l-.053-.022a1.69 1.69 0 0 1-1.059-1.712L3.462.458A.5.5 0 0 1 3.96 0z" />
                </svg>
            </div>
            <div class="lista-adicionais">
                <div class="item-adic" onclick="selecionarAdic(this, 'Bacon', 5.00)">Bacon Extra (+ R$ 5,00)</div>
                <div class="item-adic" onclick="selecionarAdic(this, 'Cebola', 3.00)">Cebola Caramelizada (+ R$ 3,00)
                </div>
                <div class="item-adic" onclick="selecionarAdic(this, 'Ovo', 2.50)">Ovo (+ R$ 2,50)</div>
            </div>
        </section>

        <section id="step-5" class="step">
            <div class="grid-bebidas">
                <div class="card-bebida" onclick="selecionarProd(this, 'Coca-Cola', 8.00)">
                    <img src="coca.jpg">
                    <p>Coca-Cola</p>
                </div>
                <div class="card-bebida" onclick="selecionarProd(this, 'Suco', 10.00)">
                    <img src="suco.jpeg">
                    <p>Suco Natural</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="controles">
        <button id="btn-proximo" onclick="proximo()">PRÓXIMO</button>
        <button id="btn-enviar" onclick="finalizar()" style="display: none;">ENVIAR PEDIDO</button>
    </footer>

    <div id="registro-flutuante" onclick="abrirRegistro()">Registro</div>

    <div id="modal-reg" class="modal">
        <div class="modal-box">
            <span class="fechar" onclick="fecharRegistro()">&times;</span>
            <h2 style="color:#000; margin-bottom: 15px;">PEDIDOS REGISTRADOS</h2>
            <div id="dados-registro"></div>
            <button class="btn-print" onclick="imprimir()">IMPRIMIR EXTRATO</button>
        </div>
    </div>

    <div id="toast" class="toast">✅ Pedido de <span id="t-nome"></span> realizado!</div>

    <script src="script.js"></script>
</body>

</html>
